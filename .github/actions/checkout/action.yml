name: artifact-checkout
description: Replace the Checkout able to work either from an artifact or a git repo

inputs:
  artifact-id:
    description: The artifact-id to download and unpack.  If not given, a standard git checkout is ran
    required: true
  artifact-runner-id:
    description: Which runner generated the artifact
    default: ${{ github.runner }}
  path:
    description: Where to checkout to
    default: ''

runs:
  using: composite
  steps:
    - name: Wipe existing
      shell: bash
      run: |
        set -ex
        p=${{ inputs.path || '.' }}/
        if [ -e "$p" ]; then
          find "$p" -maxdepth 1 -mindepth 1 \! -name .github -exec rm -rf {} \+
        fi
    - name: post Wipe
      shell: bash
      run: |
        find .
    - name: Download artifact
      id: download
      if: inputs.artifact-id
      uses: actions/download-artifact@v5
      with:
        artifact-ids: ${{ inputs.artifact-id }}
        run-id: ${{ inputs.artifact-runner-id}}
    - name: unwrap the zip crap
      shell: bash
      run: |
        set -ex
        find .
        unzip -e ${{ steps.download.outputs.download-path }}
        rm ${{ steps.download.outputs.download-path }}
        tar -C ${{ inputs.path || '.' }} -zxf *.tar.gz
        rm *.tar.gz